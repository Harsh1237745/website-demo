<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form Page</title>
  <link rel="stylesheet" href="CSS/login.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
  <div class="wrapper">
    <form id="loginForm" action="index.html">
      <h1>Login</h1>

      <div class="input-box">
        <input id="username" type="text" placeholder="Username" required>
        <i class='bx bxs-user'></i>
      </div>

      <div class="input-box">
        <input id="password" type="password" placeholder="Password" required>
        <i class='bx bxs-lock-alt'></i>
      </div>

      <div class="remember-forgot">
        <label><input type="checkbox">Remember Me</label>
        <a href="#">Forgot Password</a>
      </div>

      <button type="submit" class="btn">Login</button>

    </form>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      const usernameValid = /^[A-Za-z]{5}$/.test(username);

      const passwordValid = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,12}$/.test(password);

      if (!usernameValid) {
        alert("Username must be exactly 5 letters.");
        event.preventDefault();
        return;
      }

      if (!passwordValid) {
        alert("Password must be at least 6–12 characters and include uppercase, lowercase, number, and symbol.");
        event.preventDefault();
        return;
      }
    });
  </script>

</body>
</html>
